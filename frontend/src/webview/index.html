<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARPA Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            red: '#DC2626',
                            darkred: '#B91C1C',
                            lightred: '#EF4444'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --primary-red: #DC2626;
            --dark-red: #B91C1C;
            --light-red: #EF4444;
            --pure-white: #FFFFFF;
            --pure-black: #000000;
            --light-gray: #F5F5F5;
            --dark-gray: #1F1F1F;
        }
        
        body {
            font-family: var(--vscode-font-family, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif);
            background-color: var(--pure-black);
            color: var(--pure-white);
        }
        
        .chat-header {
            background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .chat-messages-container {
            background-color: var(--dark-gray);
            border: 2px solid var(--primary-red);
        }
        
        .message-user {
            background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
            color: var(--pure-white);
        }
        
        .message-ai {
            background-color: var(--pure-white);
            color: var(--pure-black);
            border: 1px solid var(--primary-red);
        }
        
        .input-field {
            background-color: var(--pure-white);
            color: var(--pure-black);
            border: 2px solid var(--primary-red);
        }
        
        .input-field:focus {
            border-color: var(--dark-red);
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }
        
        .send-button {
            background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
            color: var(--pure-white);
        }
        
        .send-button:hover {
            background: linear-gradient(135deg, var(--dark-red), var(--primary-red));
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }
        
        .status-dot-user {
            background-color: var(--pure-white);
        }
        
        .status-dot-ai {
            background-color: var(--primary-red);
        }

        .sidebar {
            background-color: var(--dark-gray);
            border-right: 2px solid var(--primary-red);
        }

        .chat-item {
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
        }

        .chat-item:hover {
            border-left-color: var(--primary-red);
            background-color: rgba(220, 38, 38, 0.1);
        }

        .chat-item.active {
            border-left-color: var(--primary-red);
            background-color: rgba(220, 38, 38, 0.2);
        }

        .new-chat-btn {
            background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
            color: var(--pure-white);
            transition: all 0.2s ease;
        }

        .new-chat-btn:hover {
            background: linear-gradient(135deg, var(--dark-red), var(--primary-red));
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }
    </style>
</head>
<body class="m-0 h-screen flex">
    <!-- Sidebar -->
    <div class="sidebar w-64 p-4 flex flex-col">
        <!-- Header -->
        <div class="mb-6 text-center">
            <h1 class="text-2xl font-bold mb-2 chat-header">ARPA</h1>
            <p class="text-xs text-red-400 font-medium">AI-powered assistant</p>
        </div>
        
        <!-- New Chat Button -->
        <button 
            id="newChatBtn"
            class="new-chat-btn w-full py-3 px-4 rounded-lg font-bold mb-4 flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            New Chat
        </button>
        
        <!-- Chat List -->
        <div class="flex-1 overflow-y-auto">
            <div id="chatList" class="space-y-2">
                <!-- Chat items will be populated here -->
            </div>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="flex-1 flex flex-col p-6">
        <!-- Chat Header -->
        <div class="mb-6 text-center">
            <h2 id="currentChatTitle" class="text-2xl font-bold mb-2 chat-header">
                New Chat
            </h2>
            <p class="text-sm text-red-400 font-medium">Start a new conversation</p>
        </div>
        
        <!-- Chat Messages Container -->
        <div class="flex-1 rounded-xl mb-4 p-4 overflow-y-auto chat-messages-container" 
             id="chatMessages">
            <!-- Welcome message -->
            <div class="flex mb-4">
                <div class="message-ai rounded-lg p-3 max-w-md">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="w-2 h-2 rounded-full status-dot-ai"></span>
                        <span class="text-sm font-bold">Assistant</span>
                    </div>
                    <p class="text-sm">Hello! I'm your AI assistant. How can I help you today?</p>
                </div>
            </div>
        </div>
        
        <!-- Input Container -->
        <div class="flex gap-3 items-end">
            <div class="flex-1 relative">
                <input 
                    type="text" 
                    id="messageInput" 
                    class="w-full px-4 py-3 rounded-lg font-medium focus:outline-none input-field"
                    placeholder="Type your message here..."
                    onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }"
                />
            </div>
            <button 
                class="px-6 py-3 rounded-lg font-bold transition-all duration-200 flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed send-button"
                id="sendButton" 
                onclick="sendMessage()">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                </svg>
                <span id="sendButtonText">Send</span>
            </button>
        </div>
    </div>

    <script src="chatbot.js"></script>
</body>
</html>
